<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Stock Shop</title>
      <link rel="shortcut icon" href="img/inventory.png" type="image/x-icon">
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
      <!-- Bootstrap Icon -->
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
      <link rel="stylesheet" href="style.css">
      <script type="module" src="main.js"></script>

</head>
<body class="opacity">
      <div class="pdt-container">
            <header>
                  <h1>Stock</h1>
                  <button type="button" id="export">Export CSV <i class="bi bi-download"></i></button>
            
            </header>

            <form id="stock-form">
                  <div class="form-control">
                        <input type="text" id="name" class="prodInput" placeholder="Product name" />

                        <input type="text" id="price" class="prodInput" placeholder="Product Price" />

                        <input type="text" id="quantity" class="prodInput" placeholder="Quantity" />

                        <select name="type" id="typePdt" class="prodInput">
                              <option value="">Type pdt</option>
                              <option value="phone">Phone</option>
                              <option value="console">Console</option>
                              <option value="computer">Computer</option>
                              <option value="tv">TV</option>
                        </select>
                        
                  </div>
                  <button type="submit" class="add"> Add <i class="bi bi-plus"></i>
                  </button>
            </form>

                  <div id="edit-table" class="hide">
                        <form>
                              <h3>Edit Product:</h3>
                                    <input type="text" id="edit-name" placeholder="edit-name">

                                    <input type="text" id="edit-price" placeholder="edit-price">
                                    
                                    <input type="text" id="edit-quantity" placeholder="edit-quantity">

                                    <select name="type" id="edit-type" >
                                          <option value="">Type pdt</option>
                                          <option value="phone">Phone</option>
                                          <option value="console">Console</option>
                                          <option value="computer">Computer</option>
                                          <option value="tv">TV</option>
                                    </select>
                                    <div class="edit-actions">
                  <!-- type="submit" so the form's submit event fires correctly -->
                                          <button type="submit" id="submit">
                                                Confirm <i class="bi bi-check-square-fill"></i>
                                          </button>
                  <!-- type="button" prevents this from submitting the form -->
                                          <button type="button" id="cancel-edit-btn">
                                                Cancel
                                          </button>
                                    </div>
                        </form>
                  </div>


            <div id="toolbar">
                  <div id="search">
                        <form>
                              <label for="search-input">Search:</label>
                              <input type="text" id="search-input" placeholder="Search Product">
                        </form>
                  </div>
                  
                  <div id="filter">
                        <select id="filter-select">
                              <option value="all">All</option>
                              <option value="phone">Phone</option>
                              <option value="console">Console</option>
                              <option value="computer">Computer</option>
                              <option value="tv">TV</option>
                        </select>
                  </div>
            </div>

            <table>
                  <thead>
                        <tr>
                              <th>Product</th>
                              <th>Price</th>
                              <th>Quantity</th>
                              <th>Type</th>
                              <th colspan="2" scope="colgroup" class="define"></th>
                        </tr>
                   </thead>

                  <tbody id="product-list">

                  </tbody>
            </table>
      </div>
            
</body>
</html>
